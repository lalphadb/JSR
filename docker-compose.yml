version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jsr-frontend
    ports:
      - "3000:80"
    networks:
      - jsr-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jsr.rule=Host(\`jsr.4lb.ca\`)"
      - "traefik.http.routers.jsr.entrypoints=websecure"
      - "traefik.http.routers.jsr.tls=true"
      - "traefik.http.routers.jsr.tls.certresolver=letsencrypt"
      - "traefik.http.services.jsr.loadbalancer.server.port=80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jsr-backend
    ports:
      - "4000:4000"
    networks:
      - jsr-network
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jsr-api.rule=Host(\`api.jsr.4lb.ca\`)"
      - "traefik.http.routers.jsr-api.entrypoints=websecure"
      - "traefik.http.routers.jsr-api.tls=true"
      - "traefik.http.routers.jsr-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.jsr-api.loadbalancer.server.port=4000"

networks:
  jsr-network:
    external: true
    name: 4lbca_frontend
